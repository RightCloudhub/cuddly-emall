spring:
  application:
    name: mall
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${MALL_DB_URL:jdbc:postgresql://localhost:5432/mall}
    username: ${MALL_DB_USER:mall}
    password: ${MALL_DB_PASSWORD:mall}
    hikari:
      maximum-pool-size: 10
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      url: ${MALL_REDIS_URL:redis://localhost:6379/1}

server:
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

mall:
  jwt:
    secret: ${MALL_JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
    issuer: mall
    access-token-ttl-seconds: 86400
  minio:
    endpoint: ${MALL_MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MALL_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MALL_MINIO_SECRET_KEY:minioadmin}
    bucket: ${MALL_MINIO_BUCKET:mall}
  askflow:
    base-url: ${MALL_ASKFLOW_BASE_URL:http://askflow:8000}
    service-token: ${MALL_ASKFLOW_SERVICE_TOKEN:}
    kb-fixed-delay-ms: 10000
    user-fixed-delay-ms: 5000
    batch-size: 100
    kb-max-retries: 5
    user-max-retries: 5
    request-timeout-ms: 10000
    bridge-token-ttl-seconds: 3600

logging:
  level:
    com.example.mall: INFO
